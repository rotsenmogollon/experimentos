# Postiz en local. Uso: docker compose up -d
# Luego accede a http://localhost:4007
# Documentación: https://docs.postiz.com/installation/docker-compose

services:
  postiz:
    image: ghcr.io/gitroomhq/postiz-app:latest
    container_name: postiz
    restart: always
    environment:
      MAIN_URL: "https://second-dom-college-accordingly.trycloudflare.com"
      FRONTEND_URL: "https://second-dom-college-accordingly.trycloudflare.com"
      NEXT_PUBLIC_BACKEND_URL: "https://second-dom-college-accordingly.trycloudflare.com/api"
      JWT_SECRET: ${POSTIZ_JWT_SECRET:-financiera-mi-casa-jwt-secret-change-me-2026}
      DATABASE_URL: postgresql://postiz-user:postiz-password@postiz-postgres:5432/postiz-db-local
      REDIS_URL: redis://postiz-redis:6379
      BACKEND_INTERNAL_URL: http://localhost:3000
      TEMPORAL_ADDRESS: temporal:7233
      IS_GENERAL: "true"
      DISABLE_REGISTRATION: "false"
      RUN_CRON: "true"
      STORAGE_PROVIDER: local
      UPLOAD_DIRECTORY: /uploads
      NEXT_PUBLIC_UPLOAD_DIRECTORY: /uploads
      FACEBOOK_APP_ID: "1044095926017958"
      FACEBOOK_APP_SECRET: "3b9b129022e5de768ba7173f136d794d"
      INSTAGRAM_APP_ID: "1044095926017958"
      INSTAGRAM_APP_SECRET: "3b9b129022e5de768ba7173f136d794d"
      API_LIMIT: "200"
      NX_ADD_PLUGINS: "false"
    volumes:
      - postiz-config:/config/
      - postiz-uploads:/uploads/
    ports:
      - "4007:5000"
    # Parche para túneles (Cloudflare/ngrok): cookie con hostname completo (Issue #1143)
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        F="/app/apps/backend/dist/libraries/helpers/src/subdomain/subdomain.management.js"
        if [ -f "$$F" ]; then
          sed -i 's/return url[.]domain ? .* url[.]domain : url[.]hostname;/return url.hostname;/' "$$F" || true
          echo "✅ Cookie domain patch applied"
        fi
        AUTH="/app/apps/backend/dist/apps/backend/src/api/routes/auth.controller.js"
        if [ -f "$$AUTH" ]; then
          sed -i '/response\.header.*reload.*true/d' "$$AUTH" 2>/dev/null || true
          sed -i 's/domain: (0, subdomain_management_1.getCookieUrlFromDomain)(process.env.FRONTEND_URL),//g' "$$AUTH" 2>/dev/null || true
          echo "✅ Reload header + cookie domain patches applied"
        fi
        echo "ℹ️  NEXT_PUBLIC_BACKEND_URL will be set to /api via export (no static file patching)"
        echo "⏳ Waiting for Temporal at temporal:7233..."
        until node -e "require('net').connect(7233,'temporal',function(){this.destroy();process.exit(0)}).on('error',function(){process.exit(1)})"; do sleep 2; done
        echo "✅ Temporal is ready"
        BACKEND_PKG="/app/apps/backend/package.json"
        if [ -f "$$BACKEND_PKG" ]; then
          sed -i 's|"start": "dotenv -e ../../.env -- node|"start": "node|' "$$BACKEND_PKG" || true
          sed -i 's|"pm2": "pm2 start pnpm --name backend -- start"|"pm2": "pm2 start node --name backend -- --experimental-require-module ./dist/apps/backend/src/main.js"|' "$$BACKEND_PKG" || true
          echo "✅ Backend start+pm2 scripts patched"
        fi
        exec docker-entrypoint.sh sh -c "nginx && pnpm run pm2"
    networks:
      - postiz-network
      - temporal-network
    depends_on:
      postiz-postgres:
        condition: service_healthy
      postiz-redis:
        condition: service_healthy
      temporal:
        condition: service_started

  postiz-postgres:
    image: postgres:17-alpine
    container_name: postiz-postgres
    restart: always
    environment:
      POSTGRES_PASSWORD: postiz-password
      POSTGRES_USER: postiz-user
      POSTGRES_DB: postiz-db-local
    volumes:
      - postgres-volume:/var/lib/postgresql/data
    networks:
      - postiz-network
    healthcheck:
      test: pg_isready -U postiz-user -d postiz-db-local
      interval: 10s
      timeout: 3s
      retries: 3

  postiz-redis:
    image: redis:7.2
    container_name: postiz-redis
    restart: always
    healthcheck:
      test: redis-cli ping
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - postiz-redis-data:/data
    networks:
      - postiz-network

  temporal-elasticsearch:
    container_name: temporal-elasticsearch
    image: elasticsearch:7.17.27
    environment:
      - cluster.routing.allocation.disk.threshold_enabled=true
      - cluster.routing.allocation.disk.watermark.low=512mb
      - cluster.routing.allocation.disk.watermark.high=256mb
      - cluster.routing.allocation.disk.watermark.flood_stage=128mb
      - discovery.type=single-node
      - ES_JAVA_OPTS=-Xms256m -Xmx256m
      - xpack.security.enabled=false
    networks:
      - temporal-network
    expose:
      - 9200
    volumes:
      - temporal-es-data:/usr/share/elasticsearch/data

  temporal-postgresql:
    container_name: temporal-postgresql
    image: postgres:16
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    networks:
      - temporal-network
    expose:
      - 5432
    volumes:
      - temporal-pg-data:/var/lib/postgresql/data

  temporal:
    container_name: temporal
    ports:
      - "7233:7233"
    image: temporalio/auto-setup:1.28.1
    depends_on:
      - temporal-postgresql
      - temporal-elasticsearch
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=temporal-postgresql
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/development-sql.yaml
      - ENABLE_ES=true
      - ES_SEEDS=temporal-elasticsearch
      - ES_VERSION=v7
      - TEMPORAL_NAMESPACE=default
    networks:
      - temporal-network
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig

  temporal-ui:
    container_name: temporal-ui
    image: temporalio/ui:2.34.0
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://127.0.0.1:3000
    networks:
      - temporal-network
    ports:
      - "8085:8080"

volumes:
  postgres-volume:
  postiz-redis-data:
  postiz-config:
  postiz-uploads:
  temporal-es-data:
  temporal-pg-data:

networks:
  postiz-network:
  temporal-network:
    driver: bridge
    name: temporal-network
